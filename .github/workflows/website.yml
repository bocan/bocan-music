name: Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "CHANGELOG.md"
      - ".github/workflows/website.yml"
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build with Eleventy
        working-directory: website
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v5

      # The Pages backend intermittently rejects deployments with a generic
      # "Deployment failed, try again later". When that hits the post-release
      # workflow_run deploy, the appcast silently goes stale and Sparkle stops
      # offering updates until an unrelated push redeploys the site. Retry once
      # after a pause before failing the run.
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 60

      - name: Retry deploy
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5

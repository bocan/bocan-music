## Bòcan — project.yml (XcodeGen)
# Run `xcodegen generate` to regenerate Bocan.xcodeproj from this file.

name: Bocan
options:
  bundleIdPrefix: io.cloudcauldron
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top
  settingPresets: app
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    PRODUCT_BUNDLE_IDENTIFIER: io.cloudcauldron.bocan
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/Bocan.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    CLANG_ENABLE_OBJC_ARC: YES
    ALWAYS_SEARCH_USER_PATHS: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""
      ENABLE_NS_ASSERTIONS: NO

targets:
  Bocan:
    type: application
    platform: macOS
    sources:
      - path: App
        excludes:
          - "**/*.md"
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_NAME: Bocan
        PRODUCT_MODULE_NAME: Bocan
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: "Bòcan"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
    dependencies:
      - package: Observability
      - package: AudioEngine
      - package: Persistence
      - package: UI
    scheme:
      testTargets:
        - BocanTests
        - BocanUITests

  BocanTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Modules/Observability/Tests/ObservabilityTests
      - path: Modules/UI/Tests/UITests
    settings:
      base:
        PRODUCT_MODULE_NAME: BocanTests
        BUNDLE_LOADER: ""
        TEST_HOST: ""
    dependencies:
      - package: Observability
      - package: Persistence
      - package: AudioEngine
      - package: UI

  BocanUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    settings:
      base:
        TEST_TARGET_NAME: Bocan
        PRODUCT_MODULE_NAME: BocanUITests
        BUNDLE_LOADER: ""
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: ""
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO

packages:
  Observability:
    path: Modules/Observability
  AudioEngine:
    path: Modules/AudioEngine
  Persistence:
    path: Modules/Persistence
  UI:
    path: Modules/UI
